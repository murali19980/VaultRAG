version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: vaultrag_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: vaultrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - vaultrag_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vaultrag_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/vaultrag
      USE_LOCAL_LLM: "true"
      LOCAL_LLM_MODEL: qwen2.5:3b-instruct-q4_1
      EMBEDDING_MODEL: all-minilm:l6-v2
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - ollama
    restart: unless-stopped
    networks:
      - vaultrag_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultrag_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vaultrag_net

  ollama:
    image: ollama/ollama:latest
    container_name: vaultrag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - vaultrag_net
    # Spin up Ollama and pre-pull the required models automatically
    command: >
      sh -c "ollama serve & 
             sleep 5 && 
             ollama pull qwen2.5:3b-instruct-q4_1 && 
             ollama pull all-minilm:l6-v2 && 
             wait"

volumes:
  postgres_data:
  ollama_data:

networks:
  vaultrag_net:
    driver: bridge
